<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .box {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            overflow: hidden;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #1a1a1a;
        }
        .tabs button {
            flex: 1;
            padding: 14px 10px;
            background: #050505;
            border: none;
            color: #444;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tabs button.active {
            color: #ccc;
            background: #0a0a0a;
            border-bottom: 2px solid #555;
        }
        .tabs button:hover {
            color: #888;
        }
        .tab-content {
            padding: 35px 30px;
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 25px;
            border: 1px solid #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon svg {
            width: 22px;
            height: 22px;
            stroke: #555;
            fill: none;
            stroke-width: 1.5;
        }
        h1 {
            text-align: center;
            color: #ccc;
            font-size: 20px;
            font-weight: normal;
            margin-bottom: 5px;
        }
        .sub {
            text-align: center;
            color: #333;
            font-size: 12px;
            margin-bottom: 28px;
        }
        input, textarea {
            width: 100%;
            padding: 14px 15px;
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            font-size: 14px;
            color: #ccc;
            outline: none;
            margin-bottom: 12px;
            font-family: 'Courier New', monospace;
        }
        textarea {
            min-height: 200px;
            max-height: 350px;
            resize: vertical;
            line-height: 1.5;
        }
        input::placeholder, textarea::placeholder {
            color: #333;
        }
        input:focus, textarea:focus {
            border-color: #333;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #111;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #161616;
            color: #fff;
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: default;
        }
        .loading {
            display: none;
            text-align: center;
            color: #333;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .loading.show {
            display: block;
        }
        .error {
            display: none;
            padding: 12px;
            background: #0a0000;
            border: 1px solid #1a0000;
            border-radius: 10px;
            color: #944;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .error.show {
            display: block;
        }
        .result {
            display: none;
            padding: 15px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 10px;
        }
        .result.show {
            display: block;
        }
        .result .out {
            color: #888;
            font-size: 13px;
            word-break: break-all;
            margin-bottom: 12px;
            max-height: 220px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            line-height: 1.5;
            white-space: pre-wrap;
            background: #050505;
            padding: 12px;
            border-radius: 8px;
        }
        .result .out::-webkit-scrollbar {
            width: 3px;
        }
        .result .out::-webkit-scrollbar-track {
            background: transparent;
        }
        .result .out::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border-radius: 3px;
        }
        .result .btns {
            display: flex;
            gap: 8px;
        }
        .result .btns button {
            flex: 1;
            padding: 11px;
            font-size: 12px;
            margin-bottom: 0;
        }
        .copied {
            border-color: #1a3a1a !important;
            color: #4a4 !important;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="tabs">
            <button class="active" onclick="switchTab('bypass')">Bypass</button>
            <button onclick="switchTab('obfuscator')">Lua Obfuscator</button>
        </div>

        <!-- BYPASS -->
        <div class="tab-content active" id="tab-bypass">
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/>
                </svg>
            </div>
            <h1>Link Bypasser</h1>
            <p class="sub">Paste your link to get started</p>
            <input type="text" id="bpUrl" placeholder="Paste link here..." autocomplete="off">
            <button class="btn" id="bpBtn">Bypass</button>
            <div class="loading" id="bpLoad">Processing...</div>
            <div class="error" id="bpErr"></div>
            <div class="result" id="bpOut">
                <div class="out" id="bpResult"></div>
                <div class="btns">
                    <button id="bpCopy">Copy</button>
                    <button id="bpOpen">Open</button>
                </div>
            </div>
        </div>

        <!-- LUA OBFUSCATOR -->
        <div class="tab-content" id="tab-obfuscator">
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-linecap="round"/>
                </svg>
            </div>
            <h1>Lua Obfuscator</h1>
            <p class="sub">Paste your Lua code to obfuscate</p>
            <textarea id="obfInput" placeholder="Paste your Lua code here..." spellcheck="false"></textarea>
            <button class="btn" id="obfBtn">Obfuscate</button>
            <div class="loading" id="obfLoad">Obfuscating...</div>
            <div class="error" id="obfErr"></div>
            <div class="result" id="obfOut">
                <div class="out" id="obfResult"></div>
                <div class="btns">
                    <button id="obfCopy">Copy</button>
                    <button id="obfDownload">Download .lua</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ TAB SWITCH ============
        function switchTab(t) {
            document.querySelectorAll('.tabs button').forEach(function(b, i) {
                b.classList.remove('active');
                if ((t === 'bypass' && i === 0) || (t === 'obfuscator' && i === 1)) {
                    b.classList.add('active');
                }
            });
            document.getElementById('tab-bypass').classList.toggle('active', t === 'bypass');
            document.getElementById('tab-obfuscator').classList.toggle('active', t === 'obfuscator');
        }

        // ============ BYPASS ============
        (function() {
            var url = document.getElementById('bpUrl');
            var btn = document.getElementById('bpBtn');
            var load = document.getElementById('bpLoad');
            var err = document.getElementById('bpErr');
            var out = document.getElementById('bpOut');
            var result = document.getElementById('bpResult');
            var copyBtn = document.getElementById('bpCopy');
            var openBtn = document.getElementById('bpOpen');

            function validUrl(s) {
                return s.indexOf('http') === 0 || s.indexOf('https') === 0;
            }

            btn.onclick = function() {
                var u = url.value.trim();
                if (!u) { err.innerHTML = 'Please enter a link'; err.className = 'error show'; return; }
                if (!validUrl(u)) { err.innerHTML = 'Invalid link'; err.className = 'error show'; return; }

                btn.disabled = true;
                btn.innerHTML = 'Processing...';
                load.className = 'loading show';
                out.className = 'result';
                err.className = 'error';

                var api = 'https://trw.lat/api/bypass?apikey=TRW_FREE-GAY-15a92945-9b04-4c75-8337-f2a6007281e9&url=' + encodeURIComponent(u);

                fetch(api)
                    .then(function(r) { return r.json(); })
                    .then(function(d) {
                        if (d.success && d.result) {
                            var c = d.result;
                            if (typeof c === 'string') {
                                c = c.replace(/^\(['"](.+?)['"],\s*(True|False)\)$/, '$1');
                                c = c.replace(/^["'](.+?)["']$/, '$1');
                            }
                            result.innerHTML = c;
                            out.className = 'result show';
                            copyBtn.click();
                        } else {
                            err.innerHTML = 'Unable to process this link';
                            err.className = 'error show';
                        }
                    })
                    .catch(function() {
                        err.innerHTML = 'Connection error';
                        err.className = 'error show';
                    })
                    .finally(function() {
                        btn.disabled = false;
                        btn.innerHTML = 'Bypass';
                        load.className = 'loading';
                    });
            };

            copyBtn.onclick = function() {
                var t = result.innerHTML;
                if (!t) return;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(t).then(function() {
                        copyBtn.innerHTML = 'Copied!';
                        copyBtn.className = 'copied';
                        setTimeout(function() { copyBtn.innerHTML = 'Copy'; copyBtn.className = ''; }, 1500);
                    });
                }
            };

            openBtn.onclick = function() {
                var u = result.innerHTML;
                if (u && validUrl(u)) window.open(u, '_blank');
            };

            url.onkeypress = function(e) { if (e.key === 'Enter') btn.click(); };
        })();

        // ============ LUA OBFUSCATOR ============
        (function() {
            var inp = document.getElementById('obfInput');
            var btn = document.getElementById('obfBtn');
            var load = document.getElementById('obfLoad');
            var err = document.getElementById('obfErr');
            var out = document.getElementById('obfOut');
            var result = document.getElementById('obfResult');
            var copyBtn = document.getElementById('obfCopy');
            var downBtn = document.getElementById('obfDownload');

            function obfuscate(code) {
                // Remove comments
                code = code.replace(/--\[\[[\s\S]*?\]\]/g, '');
                code = code.replace(/--[^\n]*/g, '');

                // Convert to \xxx format
                var bytes = [];
                for (var i = 0; i < code.length; i++) {
                    bytes.push('\\' + code.charCodeAt(i));
                }
                var encoded = bytes.join('');

                // Split into chunks
                var chunks = [];
                var size = 60;
                for (var i = 0; i < encoded.length; i += size) {
                    chunks.push('"' + encoded.substring(i, Math.min(i + size, encoded.length)) + '"');
                }

                return 'local t={' + chunks.join(';') + '}\nlocal r=""\nfor i=1,#t do r=r..t[i] end\nlocal f=loadstring(r)\nf()';
            }

            btn.onclick = function() {
                var v = inp.value.trim();
                if (!v) { err.innerHTML = 'Please paste Lua code'; err.className = 'error show'; return; }

                btn.disabled = true;
                btn.innerHTML = 'Obfuscating...';
                load.className = 'loading show';
                out.className = 'result';
                err.className = 'error';

                setTimeout(function() {
                    try {
                        var r = obfuscate(v);
                        if (r.length < 10) {
                            err.innerHTML = 'Could not obfuscate';
                            err.className = 'error show';
                        } else {
                            result.innerHTML = r;
                            out.className = 'result show';
                        }
                    } catch(e) {
                        err.innerHTML = 'Error: ' + e.message;
                        err.className = 'error show';
                    }
                    btn.disabled = false;
                    btn.innerHTML = 'Obfuscate';
                    load.className = 'loading';
                }, 200);
            };

            copyBtn.onclick = function() {
                var t = result.innerHTML;
                if (!t) return;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(t).then(function() {
                        copyBtn.innerHTML = 'Copied!';
                        copyBtn.className = 'copied';
                        setTimeout(function() { copyBtn.innerHTML = 'Copy'; copyBtn.className = ''; }, 1500);
                    });
                }
            };

            downBtn.onclick = function() {
                var t = result.innerHTML;
                if (!t) return;
                var b = new Blob([t], {type: 'text/plain'});
                var u = URL.createObjectURL(b);
                var a = document.createElement('a');
                a.href = u; a.download = 'obfuscated.lua';
                a.click(); URL.revokeObjectURL(u);
                downBtn.innerHTML = 'Downloaded!';
                downBtn.className = 'copied';
                setTimeout(function() { downBtn.innerHTML = 'Download .lua'; downBtn.className = ''; }, 1500);
            };

            inp.onkeydown = function(e) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    var s = this.selectionStart;
                    this.value = this.value.substring(0, s) + '    ' + this.value.substring(this.selectionEnd);
                    this.selectionStart = this.selectionEnd = s + 4;
                }
            };
        })();
    </script>
</body>
</html>
