<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Userfromxit</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;font-family:Arial,Helvetica,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        
        .box{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:20px;width:90%;max-width:500px;overflow:hidden}
        
        .tabs{display:flex;border-bottom:1px solid #1a1a1a}
        .tabs button{flex:1;padding:14px 10px;background:#050505;border:none;color:#444;font-size:13px;cursor:pointer;border-bottom:2px solid transparent}
        .tabs button.active{color:#ccc;background:#0a0a0a;border-bottom:2px solid #555}
        
        .tab-content{padding:30px;display:none}
        .tab-content.active{display:block}
        .tab-content h1{text-align:center;color:#ccc;font-size:20px;margin-bottom:5px}
        .tab-content .sub{text-align:center;color:#333;font-size:12px;margin-bottom:25px}
        
        input[type="text"],textarea{width:100%;padding:14px;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:12px;font-size:14px;color:#ccc;outline:none;margin-bottom:12px;font-family:'Courier New',monospace}
        textarea{min-height:200px;max-height:300px;resize:vertical;line-height:1.5}
        input::placeholder,textarea::placeholder{color:#333}
        input:focus,textarea:focus{border-color:#555}
        
        .btn{width:100%;padding:14px;background:#111;border:1px solid #1a1a1a;border-radius:12px;color:#888;font-size:14px;cursor:pointer;margin-bottom:10px;transition:.2s;text-align:center;display:block}
        .btn:hover{background:#161616;color:#fff}
        .btn.small{flex:1;padding:10px;font-size:11px;margin-bottom:0}
        
        .result-box{background:#050505;border:1px solid #1a1a1a;border-radius:10px;padding:12px;margin-top:10px;max-height:250px;overflow-y:auto;display:none}
        .result-box.show{display:block}
        .result-box pre{color:#888;font-size:12px;white-space:pre-wrap;word-break:break-all;font-family:'Courier New',monospace;line-height:1.5;margin:0 0 10px 0}
        .result-box .btns{display:flex;gap:8px}
        .copied{background:#0a1a0a!important;border-color:#1a3a1a!important;color:#4a4!important}
    </style>
</head>
<body>
    <div class="box" id="mainBox">
        <div class="tabs">
            <button class="active" id="tabBtn1">Bypass</button>
            <button id="tabBtn2">Lua Obfuscator</button>
        </div>
        
        <!-- BYPASS TAB -->
        <div class="tab-content active" id="tab1">
            <h1>Link Bypasser</h1>
            <p class="sub">Paste your link to get started</p>
            <input type="text" id="bpUrl" placeholder="Paste link here..." autocomplete="off">
            <button class="btn" id="bpBtn">Bypass</button>
            <div class="result-box" id="bpResultBox">
                <pre id="bpResultText"></pre>
                <div class="btns">
                    <button class="btn small" id="bpCopyBtn">Copy</button>
                    <button class="btn small" id="bpOpenBtn">Open</button>
                </div>
            </div>
        </div>
        
        <!-- OBFUSCATOR TAB -->
        <div class="tab-content" id="tab2">
            <h1>Lua Obfuscator</h1>
            <p class="sub">Paste your Lua code to obfuscate</p>
            <textarea id="obfInput" placeholder="Paste your Lua code here..." spellcheck="false"></textarea>
            <button class="btn" id="obfBtn">Obfuscate</button>
            <div class="result-box" id="obfResultBox">
                <pre id="obfResultText"></pre>
                <div class="btns">
                    <button class="btn small" id="obfCopyBtn">Copy</button>
                    <button class="btn small" id="obfDownloadBtn">Download</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        // ===== PROTEÇÃO =====
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
            }
        });
        setInterval(function() {
            if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) {
                document.body.innerHTML = '';
                window.location.replace('about:blank');
            }
        }, 1000);

        // ===== TABS =====
        document.getElementById('tabBtn1').onclick = function() {
            this.classList.add('active');
            document.getElementById('tabBtn2').classList.remove('active');
            document.getElementById('tab1').classList.add('active');
            document.getElementById('tab2').classList.remove('active');
        };
        document.getElementById('tabBtn2').onclick = function() {
            this.classList.add('active');
            document.getElementById('tabBtn1').classList.remove('active');
            document.getElementById('tab2').classList.add('active');
            document.getElementById('tab1').classList.remove('active');
        };

        // ===== BYPASS =====
        document.getElementById('bpBtn').onclick = function() {
            var url = document.getElementById('bpUrl').value.trim();
            if (!url) return;
            
            var btn = this;
            btn.disabled = true;
            btn.textContent = 'Processing...';
            document.getElementById('bpResultBox').classList.remove('show');
            
            fetch('https://trw.lat/api/bypass?apikey=TRW_FREE-GAY-15a92945-9b04-4c75-8337-f2a6007281e9&url=' + encodeURIComponent(url))
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.success && d.result) {
                        var clean = d.result;
                        if (typeof clean === 'string') {
                            clean = clean.replace(/^\(['"](.+?)['"],\s*(True|False)\)$/, '$1');
                            clean = clean.replace(/^["'](.+?)["']$/, '$1');
                        }
                        document.getElementById('bpResultText').textContent = clean;
                        document.getElementById('bpResultBox').classList.add('show');
                    }
                })
                .catch(function() {
                    document.getElementById('bpResultText').textContent = 'Error connecting';
                    document.getElementById('bpResultBox').classList.add('show');
                })
                .finally(function() {
                    btn.disabled = false;
                    btn.textContent = 'Bypass';
                });
        };

        document.getElementById('bpCopyBtn').onclick = function() {
            copyText(document.getElementById('bpResultText').textContent, this);
        };

        document.getElementById('bpOpenBtn').onclick = function() {
            var url = document.getElementById('bpResultText').textContent;
            if (url && url.indexOf('http') === 0) window.open(url, '_blank');
        };

        document.getElementById('bpUrl').onkeypress = function(e) {
            if (e.key === 'Enter') document.getElementById('bpBtn').click();
        };

        // ===== OBFUSCATOR =====
        document.getElementById('obfBtn').onclick = function() {
            var code = document.getElementById('obfInput').value.trim();
            if (!code) return;
            
            // Remove comments
            code = code.replace(/--\[\[[\s\S]*?\]\]/g, '');
            code = code.replace(/--[^\n]*/g, '');
            
            // Rename local vars
            var reserved = ['nil','true','false','and','or','not','local','function','if','then','else','elseif','end','for','while','do','repeat','until','return','break','in','goto'];
            var localRegex = /\blocal\s+([a-zA-Z_][a-zA-Z0-9_]*)/g;
            var match;
            var varMap = {};
            
            while ((match = localRegex.exec(code)) !== null) {
                if (reserved.indexOf(match[1]) === -1 && match[1].length > 1 && !varMap[match[1]]) {
                    varMap[match[1]] = randomStr(10);
                }
            }
            
            for (var old in varMap) {
                var safe = old.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                code = code.replace(new RegExp('\\b' + safe + '\\b', 'g'), varMap[old]);
            }
            
            // Convert to bytes
            var bytes = [];
            for (var i = 0; i < code.length; i++) {
                bytes.push('\\' + code.charCodeAt(i));
            }
            var encoded = bytes.join('');
            
            // Split into chunks
            var chunks = [];
            for (var i = 0; i < encoded.length; i += 50) {
                chunks.push('"' + encoded.substring(i, Math.min(i + 50, encoded.length)) + '"');
            }
            
            // Generate var names
            var v1 = 't' + randomStr(6);
            var v2 = 'r' + randomStr(6);
            var v3 = 'i' + randomStr(6);
            var v4 = 'f' + randomStr(5);
            
            // Build result
            var result = 'local ' + v1 + '={' + chunks.join(';') + '}\n';
            result += 'local ' + v2 + '=""\n';
            result += 'for ' + v3 + '=1,#' + v1 + ' do ' + v2 + '=' + v2 + '..' + v1 + '[' + v3 + '] end\n';
            result += 'local ' + v4 + '=loadstring(' + v2 + ')\n';
            result += v4 + '()';
            
            document.getElementById('obfResultText').textContent = result;
            document.getElementById('obfResultBox').classList.add('show');
        };

        document.getElementById('obfCopyBtn').onclick = function() {
            copyText(document.getElementById('obfResultText').textContent, this);
        };

        document.getElementById('obfDownloadBtn').onclick = function() {
            var text = document.getElementById('obfResultText').textContent;
            if (!text) return;
            var blob = new Blob([text], { type: 'text/plain' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'obfuscated.lua';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        // ===== UTILS =====
        function randomStr(len) {
            var chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
            var str = '';
            for (var i = 0; i < len; i++) str += chars.charAt(Math.floor(Math.random() * chars.length));
            return str;
        }

        function copyText(text, btn) {
            if (!text) return;
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            ta.style.top = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            
            var orig = btn.textContent;
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(function() {
                btn.textContent = orig;
                btn.classList.remove('copied');
            }, 1500);
        }
    })();
    </script>
</body>
</html>
