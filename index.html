<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;font-family:Arial,Helvetica,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;-webkit-user-select:none;user-select:none}
        .box{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:20px;width:90%;max-width:500px;overflow:hidden}
        .tabs{display:flex;border-bottom:1px solid #1a1a1a}
        .tabs button{flex:1;padding:14px 10px;background:#050505;border:none;color:#444;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
        .tabs button.active{color:#ccc;background:#0a0a0a;border-bottom:2px solid #555}
        .tabs button:hover{color:#888}
        .tab-content{padding:35px 30px;display:none}
        .tab-content.active{display:block}
        .icon{width:50px;height:50px;margin:0 auto 25px;border:1px solid #1a1a1a;border-radius:50%;display:flex;align-items:center;justify-content:center}
        .icon svg{width:22px;height:22px;stroke:#555;fill:none;stroke-width:1.5}
        h1{text-align:center;color:#ccc;font-size:20px;font-weight:normal;margin-bottom:5px}
        .sub{text-align:center;color:#333;font-size:12px;margin-bottom:28px}
        input,textarea{width:100%;padding:14px 15px;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:12px;font-size:14px;color:#ccc;outline:none;margin-bottom:12px;font-family:'Courier New',monospace}
        textarea{min-height:200px;max-height:350px;resize:vertical;line-height:1.5}
        input::placeholder,textarea::placeholder{color:#333}
        input:focus,textarea:focus{border-color:#333}
        .btn{width:100%;padding:14px;background:#111;border:1px solid #1a1a1a;border-radius:12px;color:#888;font-size:14px;cursor:pointer;margin-bottom:15px;transition:all .2s}
        .btn:hover{background:#161616;color:#fff}
        .btn:disabled{opacity:.4;cursor:default}
        .loading{display:none;text-align:center;color:#333;font-size:12px;margin-bottom:15px}
        .loading.show{display:block}
        .error{display:none;padding:12px;background:#0a0000;border:1px solid #1a0000;border-radius:10px;color:#944;font-size:13px;margin-bottom:15px}
        .error.show{display:block}
        .result{display:none;padding:15px;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px}
        .result.show{display:block}
        .result .out{color:#888;font-size:13px;word-break:break-all;margin-bottom:12px;max-height:220px;overflow-y:auto;font-family:'Courier New',monospace;line-height:1.5;white-space:pre-wrap;background:#050505;padding:12px;border-radius:8px}
        .result .out::-webkit-scrollbar{width:3px}
        .result .out::-webkit-scrollbar-track{background:transparent}
        .result .out::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:3px}
        .result .btns{display:flex;gap:8px}
        .result .btns button{flex:1;padding:11px;font-size:12px;margin-bottom:0}
        .copied{border-color:#1a3a1a!important;color:#4a4!important}
    </style>
</head>
<body>
    <div class="box">
        <div class="tabs">
            <button class="active" id="tabBypassBtn">Bypass</button>
            <button id="tabObfBtn">Lua Obfuscator</button>
        </div>
        <div class="tab-content active" id="tabBypass">
            <div class="icon"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/></svg></div>
            <h1>Link Bypasser</h1>
            <p class="sub">Paste your link to get started</p>
            <input type="text" id="bpUrl" placeholder="Paste link here..." autocomplete="off">
            <button class="btn" id="bpBtn">Bypass</button>
            <div class="loading" id="bpLoad">Processing...</div>
            <div class="error" id="bpErr"></div>
            <div class="result" id="bpOut">
                <div class="out" id="bpResult"></div>
                <div class="btns">
                    <button id="bpCopy">Copy</button>
                    <button id="bpOpen">Open</button>
                </div>
            </div>
        </div>
        <div class="tab-content" id="tabObf">
            <div class="icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-linecap="round"/></svg></div>
            <h1>Lua Obfuscator</h1>
            <p class="sub">Paste your Lua code to obfuscate</p>
            <textarea id="obfInput" placeholder="Paste your Lua code here..." spellcheck="false"></textarea>
            <button class="btn" id="obfBtn">Obfuscate</button>
            <div class="loading" id="obfLoad">Obfuscating...</div>
            <div class="error" id="obfErr"></div>
            <div class="result" id="obfOut">
                <div class="out" id="obfResult"></div>
                <div class="btns">
                    <button id="obfCopy">Copy</button>
                    <button id="obfDownload">Download .lua</button>
                </div>
            </div>
        </div>
    </div>
    <script>
    (function(){
        var _0x='Tabs|Btn|Bypass|Obf|tab|active|bypass|obfuscator|addEventListener|contextmenu|preventDefault|keydown|keyCode|ctrlKey|shiftKey|outerWidth|innerWidth|outerHeight|innerHeight|location|replace|about:blank|body|innerHTML|console|clear|setInterval|log|info|warn|error'.split('|');
        var _1={};
        for(var i=0;i<_0x.length;i++)_1[_0x[i]]=_0x[i];

        setInterval(function(){if(window[_1.outerWidth]-window[_1.innerWidth]>160||window[_1.outerHeight]-window[_1.innerHeight]>160){document[_1.body][_1.innerHTML]='';window[_1.location][_1.replace]('about:blank')}},1000);

        console[_1.log]=console[_1.info]=console[_1.warn]=console[_1.error]=function(){};

        // Bypass
        (function(){
            var u=document.getElementById('bpUrl'),b=document.getElementById('bpBtn'),l=document.getElementById('bpLoad'),e=document.getElementById('bpErr'),o=document.getElementById('bpOut'),r=document.getElementById('bpResult'),c=document.getElementById('bpCopy'),p=document.getElementById('bpOpen');
            function v(s){return s.indexOf('http')===0||s.indexOf('https')===0}

        })();

        // Obfuscator
        (function(){
            var i=document.getElementById('obfInput'),b=document.getElementById('obfBtn'),l=document.getElementById('obfLoad'),e=document.getElementById('obfErr'),o=document.getElementById('obfOut'),r=document.getElementById('obfResult'),c=document.getElementById('obfCopy'),d=document.getElementById('obfDownload');

            setTimeout(function(){try{var x=obf(v);if(x.length<10){e[_1.innerHTML]='Could not obfuscate';e.className='error show'}else{r[_1.innerHTML]=x;o.className='result show'}}catch(ex){e[_1.innerHTML]='Error: '+ex.message;e.className='error show'}b.disabled=false;b[_1.innerHTML]='Obfuscate';l.className='loading'},200)});
            c[_1.addEventListener]('click',function(){var t=r[_1.innerHTML];if(!t)return;navigator.clipboard.writeText(t).then(function(){c[_1.innerHTML]='Copied!';c.className='copied';setTimeout(function(){c[_1.innerHTML]='Copy';c.className=''},1500)})});

            i[_1.addEventListener]('keydown',function(e){if(e.key==='Tab'){e[_1.preventDefault]();var s=this.selectionStart;this.value=this.value.substring(0,s)+'    '+this.value.substring(this.selectionEnd);this.selectionStart=this.selectionEnd=s+4}});
        })();
    })();
    </script>
</body>
</html>
